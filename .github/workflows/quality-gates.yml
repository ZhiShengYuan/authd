name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Enforce repo-wide 100% coverage gate
        run: ./scripts/coverage.sh

  race-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Enforce race test gate
        run: ./scripts/race.sh
