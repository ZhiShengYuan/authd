worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log off;
    error_log /tmp/nginx-test-error.log warn;

    # Minimal standalone CI syntax check config.
    server {
        listen 18080;
        server_name localhost;

        location = /healthz {
            return 200 "ok\n";
        }
    }
}
