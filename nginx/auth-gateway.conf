# Place this file inside the `http {}` context (for include-based deployments).

# Subnet-oriented fail-open throttling bucket key.
# IPv4: first 3 octets → /24 subnet.
# IPv6: first 7 hextets → /56 subnet (best Nginx-native approximation; regex
#        cannot express arbitrary /56 boundaries for all address formats, so
#        compressed forms like ::1 are handled by the broader fallback).
# Default: hash the full address through the PDP's subnet logic; this branch
#          only fires for non-standard address formats and is still
#          subnet-aggregated by the Go PDP when the request reaches it.
map $remote_addr $subnet_key {
    ~^(\d+\.\d+\.\d+)\.\d+$                              $1.0;
    ~^([0-9a-fA-F]+:[0-9a-fA-F]+:[0-9a-fA-F]+:[0-9a-fA-F]+:[0-9a-fA-F]+:[0-9a-fA-F]+:[0-9a-fA-F]+):  $1::;
    default                                               $remote_addr;
}

# Subnet-scoped fail-open throttling bucket (IPv4 /24, IPv6 /56 approximation).
# NOTE: Nginx regex cannot natively express IPv6 /56 for all compressed address
#       forms (e.g., ::1). The 7-hextet regex covers the common expanded form.
#       Unmatched addresses fall through to $remote_addr, which is still
#       subnet-aggregated by the Go PDP on the auth path. For environments
#       requiring strict /56 for all IPv6, consider an Nginx Lua module or
#       an external rate-limiting proxy.
limit_req_zone $subnet_key zone=subnet_fallback:10m rate=30r/m;

server {
    # Default dev listener.
    listen 8080 default_server;
    listen [::]:8080 default_server;

    # Production listener example.
    # listen 443 ssl reuseport default_server;
    # listen [::]:443 ssl reuseport default_server;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    server_name _;

    # Upstream fallback mirror URL used for quota overrun redirects.
    set $fallback_mirror_url "https://mirrors.ustc.edu.cn$request_uri";

    # ----------------------------------------------------
    # Internal auth subrequest target (auth_request)
    # ----------------------------------------------------
    location = /auth/inline {
        internal;
        proxy_method POST;
        proxy_pass_request_body off;

        # Required auth context headers.
        proxy_set_header X-Protocol $server_protocol;
        proxy_set_header X-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-URL "$scheme://$host$request_uri";
        proxy_set_header X-UA $http_user_agent;
        proxy_set_header X-Scheme $scheme;
        proxy_set_header X-Host $host;
        proxy_set_header X-Method $request_method;
        proxy_set_header X-Request-Length $request_length;
        proxy_set_header X-Connection $connection;

        # TLS headers.
        proxy_set_header X-TLS-Protocol $ssl_protocol;
        proxy_set_header X-TLS-Cipher $ssl_cipher;
        proxy_set_header X-SNI $ssl_server_name;
        proxy_set_header X-SSL-Session-ID $ssl_session_id;
        proxy_set_header X-SSL-Session-Reused $ssl_session_reused;

        # JA3 headers.
        proxy_set_header X-JA3 $http_ssl_ja3;
        proxy_set_header X-JA3-Hash $http_ssl_ja3_hash;
        proxy_set_header X-JA3-Greased $http_ssl_greased;

        # JA4 headers.
        proxy_set_header X-JA4 $http_ssl_ja4;
        proxy_set_header X-JA4-String $http_ssl_ja4_string;
        proxy_set_header X-JA4H $http_ssl_ja4h;
        proxy_set_header X-JA4H-String $http_ssl_ja4h_string;

        # HTTP/2 fingerprint.
        proxy_set_header X-H2-Fingerprint $http2_fingerprint;

        # GeoIP2 headers.
        proxy_set_header X-Country $geoip2_data_country_code;
        proxy_set_header X-Country-Name $geoip2_data_country_name;
        proxy_set_header X-City $geoip2_data_city_name;
        proxy_set_header X-ASN $geoip2_data_asn;

        # TCP telemetry headers.
        proxy_set_header X-TCP-RTT $tcpinfo_rtt;
        proxy_set_header X-TCP-RTTVAR $tcpinfo_rttvar;

        # Cookie forwarding.
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_pass http://unix:/run/auth-gateway/go-auth.sock:/api/auth_inline;
    }

    # ----------------------------------------------------
    # Named auth outcomes
    # ----------------------------------------------------
    location @auth_challenge {
        add_header Set-Cookie "pow_target=$auth_target; Path=/; SameSite=Lax" always;
        return 302 /testpow/;
    }

    location @quota_exceeded {
        return 302 $fallback_mirror_url;
    }

    location @blacklist_reject {
        return 403;
    }

    location @auth_fallback {
        limit_req zone=subnet_fallback burst=20 nodelay;
        limit_rate 1m;
        proxy_pass http://unix:/tmp/nginx.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ----------------------------------------------------
    # Public endpoints (no auth_request)
    # ----------------------------------------------------
    location /testpow/ {
        alias /var/www/testpow/;
        index index.html;
    }

    location = /api/challenge {
        proxy_pass http://unix:/run/auth-gateway/go-auth.sock:/api/challenge;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-UA $http_user_agent;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /api/verify_pow {
        proxy_pass http://unix:/run/auth-gateway/go-auth.sock:/api/verify_pow;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-UA $http_user_agent;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
    }

    location = /healthz {
        proxy_pass http://unix:/run/auth-gateway/go-auth.sock:/healthz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-UA $http_user_agent;
    }

    location = /metrics {
        proxy_pass http://unix:/run/auth-gateway/go-auth.sock:/metrics;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-UA $http_user_agent;
    }

    # ----------------------------------------------------
    # Protected location
    # ----------------------------------------------------
    location / {
        auth_request /auth/inline;
        auth_request_set $rate_limit $upstream_http_x_rate_limit;
        auth_request_set $auth_action $upstream_http_x_auth_action;
        auth_request_set $auth_redirect_url $upstream_http_location;
        auth_request_set $auth_target $upstream_http_x_auth_target;

        # 401 from PDP => challenge or blacklist reject
        set $auth_redirect @auth_challenge;
        if ($auth_action = "blacklisted") {
            set $auth_redirect @blacklist_reject;
        }
        error_page 401 =302 $auth_redirect;

        # 403 from PDP => quota redirect
        error_page 403 =302 @quota_exceeded;

        # PDP unavailable => fail open with subnet throttle
        error_page 500 502 503 504 = @auth_fallback;

        proxy_pass http://unix:/tmp/nginx.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # PDP can optionally provide dynamic bandwidth.
        limit_rate $rate_limit;
    }
}
