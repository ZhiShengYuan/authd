definitions:
  api.BindMatrix:
    properties:
      ip:
        type: string
      ua:
        type: string
      url:
        type: string
    type: object
  api.ChallengeConfigRequest:
    properties:
      bind_matrix:
        $ref: '#/definitions/api.BindMatrix'
      challenge_id:
        type: string
      difficulty:
        type: integer
    type: object
  api.ChallengeVerifyRequest:
    properties:
      challenge_id:
        type: string
      nonce:
        type: string
      prefix:
        type: string
    type: object
  api.EnvelopeError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  api.ResponseEnvelope:
    properties:
      data: {}
      error:
        $ref: '#/definitions/api.EnvelopeError'
      success:
        type: boolean
    type: object
  api.TicketIssueRequest:
    properties:
      bind_matrix:
        $ref: '#/definitions/api.BindMatrix'
      uses:
        type: integer
    type: object
  api.TicketVerifyRequest:
    properties:
      bind_matrix:
        $ref: '#/definitions/api.BindMatrix'
      ticket:
        type: string
    type: object
info:
  contact: {}
  description: Internal JSON API for challenge and ticket workflows.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Mirror Guard Auth Gateway API
  version: "1.0"
paths:
  /api/challenges:
    post:
      consumes:
      - application/json
      description: Creates a challenge record and returns a signed prefix bound to
        challenge_id, difficulty, and bind matrix.
      parameters:
      - description: Challenge configuration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ChallengeConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: success=true, data=api.ChallengeConfigData
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "400":
          description: success=false, error.code=invalid_request
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "405":
          description: Method not allowed
          schema:
            type: string
      summary: Configure challenge
      tags:
      - challenges
  /api/challenges/verify:
    post:
      consumes:
      - application/json
      description: Consumes a configured challenge_id and validates nonce+prefix.
        Successful verification marks the challenge as used.
      parameters:
      - description: Challenge verification payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ChallengeVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success=true, data=api.ChallengeVerifyData
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "400":
          description: success=false, error.code=invalid_request
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "404":
          description: success=false, error.code=challenge_not_found
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "405":
          description: Method not allowed
          schema:
            type: string
        "409":
          description: success=false, error.code=challenge_replayed
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "410":
          description: success=false, error.code=challenge_expired
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
      summary: Verify configured challenge
      tags:
      - challenges
  /api/tickets:
    post:
      consumes:
      - application/json
      description: Issues a multi-use ticket bound to the provided bind matrix.
      parameters:
      - description: Ticket issue payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TicketIssueRequest'
      produces:
      - application/json
      responses:
        "201":
          description: success=true, data=api.TicketIssueData
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "400":
          description: success=false, error.code=invalid_request or ticket_exhausted
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "405":
          description: Method not allowed
          schema:
            type: string
      summary: Issue ticket
      tags:
      - tickets
  /api/tickets/verify:
    post:
      consumes:
      - application/json
      description: Verifies a ticket against bind matrix and consumes one use on each
        successful check.
      parameters:
      - description: Ticket verify payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TicketVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success=true, data=api.TicketVerifyData
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "400":
          description: success=false, error.code=invalid_request or ticket_invalid
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "404":
          description: success=false, error.code=ticket_not_found
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
        "405":
          description: Method not allowed
          schema:
            type: string
        "410":
          description: success=false, error.code=ticket_expired or ticket_exhausted
          schema:
            $ref: '#/definitions/api.ResponseEnvelope'
      summary: Verify ticket
      tags:
      - tickets
swagger: "2.0"
